name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ─── Backend Lint ──────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: cd backend && ruff check .

      - name: Ruff format check
        run: cd backend && ruff format --check .

  # ─── Backend Type Check ────────────────────────────
  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Mypy
        run: cd backend && mypy rayolly/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking until type coverage improves

  # ─── Backend Tests ─────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Run unit tests
        run: cd backend && python -m pytest tests/unit/ -v --tb=short --cov=rayolly --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ─── Backend Security ──────────────────────────────
  backend-security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: cd backend && safety check --file pyproject.toml || true

  # ─── Frontend Lint ─────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: TypeScript check
        run: cd frontend && npm run type-check

  # ─── Docker Build ──────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t rayolly-api:test ./backend

      - name: Build frontend image
        run: docker build -t rayolly-web:test ./frontend

  # ─── Integration Tests ─────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.12
        ports:
          - 8123:8123
          - 9000:9000
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
        options: --name nats -p 4222:4222
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rayolly
          POSTGRES_PASSWORD: rayolly_dev
          POSTGRES_DB: rayolly_meta
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Wait for services
        run: sleep 10

      - name: Init ClickHouse schemas
        run: |
          for f in backend/migrations/clickhouse/*.sql; do
            curl -s "http://localhost:8123/" --data-binary @"$f" || true
          done

      - name: Run integration tests
        env:
          RAYOLLY_CLICKHOUSE_HOST: localhost
          RAYOLLY_NATS_URL: nats://localhost:4222
          RAYOLLY_REDIS_URL: redis://localhost:6379
          RAYOLLY_POSTGRES_URL: postgresql+asyncpg://rayolly:rayolly_dev@localhost:5432/rayolly_meta
        run: cd backend && python -m pytest tests/integration/ -v --tb=short -m integration
