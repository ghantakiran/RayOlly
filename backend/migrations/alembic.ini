[alembic]
# Path to migration scripts relative to this file.
script_location = .

# Template used for new revision files.
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps (UTC recommended).
timezone = utc

# Truncate revision IDs to 12 characters for readability.
truncate_slug_length = 40

# SQLAlchemy URL — overridden at runtime via env.py.
sqlalchemy.url = postgresql+asyncpg://rayolly:rayolly@localhost:5432/rayolly

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
