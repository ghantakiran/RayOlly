{{- if .Values.clickhouse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rayolly.fullname" . }}-clickhouse
  labels:
    {{- include "rayolly.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: {{ include "rayolly.fullname" . }}-clickhouse
  replicas: {{ .Values.clickhouse.replicas }}
  selector:
    matchLabels:
      {{- include "rayolly.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        {{- include "rayolly.labels" . | nindent 8 }}
        app.kubernetes.io/component: clickhouse
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: init-schema
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for ClickHouse to be ready..."
              # Schema migrations run on first boot via config
              echo "Init complete."
          volumeMounts:
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d
      containers:
        - name: clickhouse
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: native
              containerPort: 9000
              protocol: TCP
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "rayolly.fullname" . }}-secrets
                  key: clickhouse-password
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d
      volumes:
        - name: clickhouse-config
          configMap:
            name: {{ include "rayolly.fullname" . }}-config
            items:
              - key: clickhouse-config.xml
                path: rayolly.xml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.clickhouse.persistence.accessModes | nindent 10 }}
        {{- if .Values.clickhouse.persistence.storageClass }}
        storageClassName: {{ .Values.clickhouse.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage }}
{{- end }}
