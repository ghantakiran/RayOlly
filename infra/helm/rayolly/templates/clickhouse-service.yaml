{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rayolly.fullname" . }}-clickhouse
  labels:
    {{- include "rayolly.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.clickhouse.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.clickhouse.service.nativePort }}
      targetPort: native
      protocol: TCP
      name: native
  selector:
    {{- include "rayolly.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
{{- end }}
