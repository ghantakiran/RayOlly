apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rayolly.fullname" . }}-secrets
  labels:
    {{- include "rayolly.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.auth.jwtSecret | b64enc | quote }}
  api-key-secret: {{ .Values.auth.apiKeySecret | b64enc | quote }}
  nats-auth-token: {{ .Values.nats.auth.token | b64enc | quote }}
  clickhouse-password: {{ .Values.clickhouse.password | b64enc | quote }}
  postgres-password: {{ .Values.postgres.password | b64enc | quote }}
  minio-access-key: {{ .Values.minio.accessKey | b64enc | quote }}
  minio-secret-key: {{ .Values.minio.secretKey | b64enc | quote }}
  anthropic-api-key: {{ .Values.ai.anthropicApiKey | default "" | b64enc | quote }}
