apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rayolly.fullname" . }}-config
  labels:
    {{- include "rayolly.labels" . | nindent 4 }}
data:
  clickhouse-config.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <logger>
        <level>warning</level>
        <console>1</console>
      </logger>
      <listen_host>0.0.0.0</listen_host>
      <http_port>8123</http_port>
      <tcp_port>9000</tcp_port>
      <max_connections>4096</max_connections>
      <keep_alive_timeout>3</keep_alive_timeout>
      <max_concurrent_queries>100</max_concurrent_queries>
      <mark_cache_size>5368709120</mark_cache_size>
      <path>/var/lib/clickhouse/</path>
      <tmp_path>/var/lib/clickhouse/tmp/</tmp_path>
      <user_files_path>/var/lib/clickhouse/user_files/</user_files_path>
      <users_config>users.xml</users_config>
      <default_profile>default</default_profile>
      <default_database>default</default_database>
      <merge_tree>
        <parts_to_delay_insert>150</parts_to_delay_insert>
        <parts_to_throw_insert>300</parts_to_throw_insert>
        <max_delay_to_insert>1</max_delay_to_insert>
      </merge_tree>
    </clickhouse>

  nats.conf: |
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222

    authorization {
      token: $NATS_AUTH_TOKEN
    }

    cluster {
      name: rayolly-nats
      listen: 0.0.0.0:6222
      routes [
        {{- $fullname := include "rayolly.fullname" . }}
        {{- $replicas := int .Values.nats.replicas }}
        {{- range $i := until $replicas }}
        nats-route://{{ $fullname }}-nats-{{ $i }}.{{ $fullname }}-nats:6222
        {{- end }}
      ]
    }

    jetstream {
      store_dir: /data/jetstream
      max_mem: 256M
      max_file: {{ .Values.nats.jetstream.storage }}
    }

    server_name: $HOSTNAME

  api-env: |
    RAYOLLY_CLICKHOUSE_HOST={{ include "rayolly.fullname" . }}-clickhouse
    RAYOLLY_CLICKHOUSE_PORT=9000
    RAYOLLY_CLICKHOUSE_HTTP_PORT=8123
    RAYOLLY_NATS_URL=nats://{{ include "rayolly.fullname" . }}-nats:4222
    RAYOLLY_REDIS_URL=redis://{{ include "rayolly.fullname" . }}-redis:6379
    RAYOLLY_POSTGRES_HOST={{ include "rayolly.fullname" . }}-postgres
    RAYOLLY_POSTGRES_PORT=5432
    RAYOLLY_POSTGRES_DATABASE={{ .Values.postgres.database }}
    RAYOLLY_MINIO_ENDPOINT={{ include "rayolly.fullname" . }}-minio:9000
