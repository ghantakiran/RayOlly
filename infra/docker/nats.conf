# ============================================================
# RayOlly NATS Server Configuration
# ============================================================

# Server identity
server_name: rayolly-nats-1

# Client connections
listen: 0.0.0.0:4222
max_connections: 1024
max_payload: 8MB

# HTTP monitoring
http_port: 8222

# Authorization
authorization {
    token: "rayolly_dev_token"
}

# JetStream
jetstream {
    store_dir: "/data/jetstream"
    max_mem: 1GB
    max_file: 10GB
    max_outstanding_catchup: 256MB
}

# Logging
debug: false
trace: false
logtime: true
log_size_limit: 100MB

# Limits
max_control_line: 4KB
ping_interval: "60s"
ping_max: 3
write_deadline: "10s"

